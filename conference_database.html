<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Impact Conferences — Juniper Collective</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@400;500;600&family=Oranienbaum&display=swap" rel="stylesheet">
<style>
  :root{
    --green-dark:#30523a; --green-sage:#72997d; --gold:#c1a55f;
    --cream:#f2ede4; --cream-dark:#e8e1d5; --text-dark:#1e2e23;
    --text-mid:#4a5e50; --text-light:#7a8f80; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--text-dark);font-family:'Montserrat',sans-serif;font-size:14px;line-height:1.6;}

  .header{background:var(--green-dark);padding:48px 40px 36px;}
  .header-label{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
  .header h1{font-family:'Oranienbaum',serif;font-size:clamp(30px,5vw,50px);font-weight:400;color:var(--cream);line-height:1.1;max-width:640px;text-transform:uppercase;letter-spacing:.04em;}
  .header-sub{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;font-weight:300;color:var(--green-sage);margin-top:12px;}

  .controls{background:var(--white);border-bottom:1px solid var(--cream-dark);position:sticky;top:0;z-index:100;}
  .controls-inner{padding:18px 40px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
  .search-wrap{position:relative;flex:1;min-width:200px;max-width:280px;}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-light);pointer-events:none;}
  .search-input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--cream-dark);border-radius:4px;font-family:'Montserrat',sans-serif;font-size:12px;background:var(--cream);color:var(--text-dark);outline:none;}
  .search-input:focus{border-color:var(--green-sage);}

  .filter-triggers{display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex:1;}
  .filter-trigger{padding:7px 14px;border-radius:20px;border:1px solid var(--cream-dark);background:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .filter-trigger:hover{border-color:var(--green-sage);color:var(--green-dark);}
  .filter-trigger.active{background:var(--green-dark);border-color:var(--green-dark);color:var(--cream);}
  .filter-trigger.open{border-color:var(--green-dark);}
  .filter-count{background:var(--green-dark);color:var(--cream);padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;display:none;}
  .filter-trigger.active .filter-count{background:rgba(242,237,228,.25);color:var(--cream);}
  .filter-trigger.has-selections .filter-count{display:inline-block;}
  .filter-caret{font-size:9px;transition:transform .2s;opacity:.7;}
  .filter-trigger.open .filter-caret{transform:rotate(180deg);}

  .toggle-upcoming{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--text-mid);cursor:pointer;white-space:nowrap;user-select:none;}
  .toggle-upcoming input{display:none;}
  .toggle-track{width:34px;height:18px;border-radius:10px;background:var(--cream-dark);position:relative;transition:background .15s;}
  .toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--white);transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .toggle-upcoming input:checked + .toggle-track{background:var(--green-sage);}
  .toggle-upcoming input:checked + .toggle-track::after{transform:translateX(16px);}

  .clear-btn{font-size:11px;font-weight:500;color:var(--text-light);background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px 8px;white-space:nowrap;font-family:'Montserrat',sans-serif;}
  .clear-btn:hover{color:var(--green-dark);}

  .filter-panel{background:var(--cream);border-top:1px solid var(--cream-dark);padding:16px 40px;display:none;}
  .filter-panel.open{display:block;}
  .panel-options{display:flex;flex-wrap:wrap;gap:6px;}
  .option{padding:6px 12px;border-radius:16px;border:1px solid var(--cream-dark);background:var(--white);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .15s;text-transform:capitalize;}
  .option:hover{border-color:var(--green-sage);color:var(--green-dark);}
  .option.selected{background:var(--green-sage);border-color:var(--green-sage);color:var(--white);}

  /* Date panel */
  .date-row{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;}
  .date-field{display:flex;flex-direction:column;gap:4px;}
  .date-field label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);}
  .date-field input{padding:7px 10px;border:1px solid var(--cream-dark);border-radius:4px;font-family:'Montserrat',sans-serif;font-size:12px;background:var(--white);color:var(--text-dark);}
  .date-presets{display:flex;gap:6px;flex-wrap:wrap;}

  /* Price slider */
  .price-panel-inner{max-width:420px;}
  .price-readout{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--green-dark);margin-bottom:14px;}
  .slider{position:relative;height:30px;}
  .slider .track{position:absolute;top:13px;left:0;right:0;height:4px;border-radius:2px;background:var(--cream-dark);}
  .slider .range{position:absolute;top:13px;height:4px;border-radius:2px;background:var(--green-sage);}
  .slider input[type=range]{position:absolute;top:0;left:0;width:100%;margin:0;background:none;pointer-events:none;-webkit-appearance:none;appearance:none;height:30px;}
  .slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:18px;height:18px;border-radius:50%;background:var(--green-dark);border:2px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer;margin-top:0;}
  .slider input[type=range]::-moz-range-thumb{pointer-events:auto;width:18px;height:18px;border-radius:50%;background:var(--green-dark);border:2px solid var(--white);cursor:pointer;}
  .price-include{margin-top:16px;display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-mid);cursor:pointer;}
  .price-include input{accent-color:var(--green-sage);width:15px;height:15px;}

  .main{padding:32px 40px 60px;max-width:1240px;}
  .results-bar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--cream-dark);}
  .results-count{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--text-mid);}
  .results-count strong{color:var(--green-dark);font-style:normal;font-weight:400;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;}
  .card{background:var(--white);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;border:1px solid transparent;transition:transform .15s,box-shadow .15s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(48,82,58,.1);border-color:var(--cream-dark);}
  .card-bar{height:5px;background:var(--bar,var(--green-sage));}
  .card-body{padding:18px;flex:1;display:flex;flex-direction:column;}
  .card-meta-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .card-topics{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--text-light);line-height:1.4;}
  .card-format{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;white-space:nowrap;}
  .f-inperson{background:rgba(193,165,95,.16);color:#9a7e3a;}
  .f-virtual{background:rgba(48,82,58,.1);color:var(--green-dark);}
  .f-hybrid{background:rgba(114,153,125,.18);color:#3f6b4f;}
  .card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;line-height:1.22;color:var(--green-dark);margin-bottom:4px;}
  .card-org{font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--text-light);margin-bottom:11px;}
  .card-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .card-meta span{font-size:12px;color:var(--text-mid);display:flex;align-items:center;gap:6px;}
  .card-meta svg{color:var(--green-sage);flex-shrink:0;}
  .card-price{font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;color:var(--green-dark);margin-bottom:12px;letter-spacing:.02em;}
  .card-price .note{display:block;font-weight:400;font-size:10px;color:var(--text-light);letter-spacing:.02em;margin-top:2px;}
  .card-audience{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;line-height:1.4;color:var(--text-mid);flex:1;margin-bottom:14px;text-transform:capitalize;}
  .card-audience b{font-style:normal;font-weight:600;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-light);display:block;margin-bottom:3px;}
  .card-summary{font-size:12.5px;line-height:1.5;color:var(--text-mid);margin-bottom:13px;}
  .card-link{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green-dark);text-decoration:none;border-bottom:1px solid var(--gold);padding-bottom:1px;align-self:flex-start;transition:color .15s;}
  .card-link:hover{color:var(--gold);}
  .state-msg{text-align:center;padding:70px 40px;}
  .state-msg p{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--text-light);}

  @media(max-width:600px){
    .header{padding:28px 20px 22px;}
    .controls-inner{padding:14px 20px;}
    .filter-panel{padding:14px 20px;}
    .main{padding:20px 20px 48px;}
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-label">Juniper Collective</div>
  <h1>Social Impact Conferences</h1>
  <p class="header-sub">A curated directory of social impact conferences worldwide</p>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="search" placeholder="Search conferences...">
    </div>
    <div class="filter-triggers">
      <button class="filter-trigger" data-filter="date">Dates <span class="filter-count">0</span><span class="filter-caret">&#9662;</span></button>
      <button class="filter-trigger" data-filter="country">Country <span class="filter-count">0</span><span class="filter-caret">&#9662;</span></button>
      <button class="filter-trigger" data-filter="city">City <span class="filter-count">0</span><span class="filter-caret">&#9662;</span></button>
      <button class="filter-trigger" data-filter="format">Format <span class="filter-count">0</span><span class="filter-caret">&#9662;</span></button>
      <button class="filter-trigger" data-filter="price">Price <span class="filter-count">0</span><span class="filter-caret">&#9662;</span></button>
      <button class="filter-trigger" data-filter="topic">Topic <span class="filter-count">0</span><span class="filter-caret">&#9662;</span></button>
      <button class="filter-trigger" data-filter="attendee">Who it's for <span class="filter-count">0</span><span class="filter-caret">&#9662;</span></button>
      <label class="toggle-upcoming"><input type="checkbox" id="upcoming-toggle" checked><span class="toggle-track"></span>Upcoming only</label>
      <button class="clear-btn" id="clear-all">Clear all</button>
    </div>
  </div>

  <div class="filter-panel" data-panel="date">
    <div class="date-row">
      <div class="date-field"><label>From</label><input type="date" id="date-from"></div>
      <div class="date-field"><label>To</label><input type="date" id="date-to"></div>

        <button class="option" data-preset="6">Next 6 months</button>
        <button class="clear-btn" id="clear-dates">Clear dates</button>
      </div>
    </div>
  </div>
  <div class="filter-panel" data-panel="country"><div class="panel-options" id="country-options"></div></div>
  <div class="filter-panel" data-panel="city"><div class="panel-options" id="city-options"></div></div>
  <div class="filter-panel" data-panel="format"><div class="panel-options" id="format-options"></div></div>
  <div class="filter-panel" data-panel="price">
    <div class="price-panel-inner">
      <div class="price-readout" id="price-readout"></div>
      <div class="slider">
        <div class="track"></div><div class="range" id="price-range-fill"></div>
        <input type="range" id="price-min" min="0" max="100" value="0">
        <input type="range" id="price-max" min="0" max="100" value="100">
      </div>
      <label class="price-include"><input type="checkbox" id="include-unpriced" checked>Include conferences without a set price (TBD, application, or invite only)</label>
    </div>
  </div>
  <div class="filter-panel" data-panel="topic"><div class="panel-options" id="topic-options"></div></div>
  <div class="filter-panel" data-panel="attendee"><div class="panel-options" id="attendee-options"></div></div>
</div>

<div class="main">
  <div id="results-bar" class="results-bar" style="display:none;"><span class="results-count" id="count-label"></span></div>
  <div class="grid" id="grid"></div>
  <div id="state" class="state-msg"><p>Loading conferences...</p></div>
</div>

function hostFromLink(link){
  const l=(link||"").toLowerCase();
  for(const k in HOST_MAP){ if(l.includes(k)) return HOST_MAP[k]; }
  const m=l.match(/https?:\/\/(?:www\.)?([^\/]+)/);
  if(m){ const p=m[1].split("."); const core=p.length>=2?p[p.length-2]:p[0]; return core.charAt(0).toUpperCase()+core.slice(1); }
  return "";
}

let state = {q:"",country:new Set(),city:new Set(),format:new Set(),topic:new Set(),
  attendee:new Set(),priceMin:0,priceMax:0,includeUnpriced:true,upcoming:true,from:"",to:""};
let PRICE_CAP = 0;

const $ = s => document.querySelector(s);
const parseISO = s => { if(!s) return null; const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };

function fmtRange(s,e){
  const ds=parseISO(s); if(!ds) return "";
  const de=parseISO(e);
  if(!de || s===e) return ds.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const left=ds.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  const right=de.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  return left+" \u2013 "+right;
}
function money(n){ return "$"+Math.round(n).toLocaleString("en-US"); }
function fmtPrice(c){
  if(c.priceStatus==="Free") return "Free";
  if(c.priceStatus==="Application or invite only") return "Application / invite only";
  if(c.priceStatus==="TBD") return "Price TBD";
  if(c.priceStatus==="Priced"){
    const lo=c.priceMin, hi=c.priceMax;
    if(lo==null && hi==null) return "Price TBD";
    if(lo===hi) return money(lo);
    if(lo===0) return "Free \u2013 "+money(hi);
    return money(lo)+" \u2013 "+money(hi);
  }
  return "Price TBD";
}
function fmtClass(f){ return f==="Virtual"?"f-virtual":f==="Hybrid"?"f-hybrid":"f-inperson"; }

function uniqueSorted(key){
  const vals=new Set();
  CONF_DATA.forEach(c=>{ const v=c[key]; if(Array.isArray(v)) v.forEach(x=>x&&vals.add(x)); else if(v) vals.add(v); });
  return [...vals].sort((a,b)=> a==="Online"?1 : b==="Online"?-1 : a.localeCompare(b));
}

function buildChips(containerId,values,setRef,filterKey){
  const c=$("#"+containerId);
  c.innerHTML=values.map(v=>`<button class="option" data-val="${v.replace(/"/g,"&quot;")}">${v}</button>`).join("");
  c.querySelectorAll("[data-val]").forEach(b=>{
    b.addEventListener("click",()=>{
      const v=b.dataset.val;
      if(setRef.has(v)){setRef.delete(v);b.classList.remove("selected");}
      else{setRef.add(v);b.classList.add("selected");}
      updateCount(filterKey,setRef.size); render();
    });
  });
}

function updateCount(key,n){
  const t=document.querySelector(`[data-filter="${key}"]`); if(!t) return;
  const el=t.querySelector(".filter-count");
  if(n>0){el.textContent=n;el.style.display="inline-block";t.classList.add("active","has-selections");}
  else{el.style.display="none";t.classList.remove("active","has-selections");}
}

function setupTriggers(){
  const trigs=document.querySelectorAll(".filter-trigger");
  const panels=document.querySelectorAll(".filter-panel");
  trigs.forEach(t=>t.addEventListener("click",()=>{
    const target=t.dataset.filter, wasOpen=t.classList.contains("open");
    trigs.forEach(x=>x.classList.remove("open")); panels.forEach(p=>p.classList.remove("open"));
    if(!wasOpen){t.classList.add("open"); document.querySelector(`[data-panel="${target}"]`).classList.add("open");}
  }));
  document.addEventListener("click",e=>{
    if(!e.target.closest(".controls")){trigs.forEach(x=>x.classList.remove("open"));panels.forEach(p=>p.classList.remove("open"));}
  });
}

// Price slider
function initPrice(){
  const prices=CONF_DATA.filter(c=>typeof c.priceMax==="number").map(c=>c.priceMax);
  PRICE_CAP=Math.ceil(Math.max(...prices)/500)*500;
  state.priceMin=0; state.priceMax=PRICE_CAP;
  const mn=$("#price-min"), mx=$("#price-max");
  mn.max=PRICE_CAP; mx.max=PRICE_CAP; mn.value=0; mx.value=PRICE_CAP; mn.step=50; mx.step=50;
  const upd=()=>{
    let lo=+mn.value, hi=+mx.value;
    if(lo>hi-50){ if(event && event.target===mn){lo=hi-50;mn.value=lo;} else {hi=lo+50;mx.value=hi;} }
    state.priceMin=lo; state.priceMax=hi;
    $("#price-range-fill").style.left=(lo/PRICE_CAP*100)+"%";
    $("#price-range-fill").style.right=(100-hi/PRICE_CAP*100)+"%";
    $("#price-readout").textContent=money(lo)+(hi>=PRICE_CAP?" \u2013 "+money(hi)+"+":" \u2013 "+money(hi));
    const changed = lo>0 || hi<PRICE_CAP;
    updateCount("price",changed?1:0);
    render();
  };
  mn.addEventListener("input",upd); mx.addEventListener("input",upd);
  $("#include-unpriced").addEventListener("change",e=>{state.includeUnpriced=e.target.checked;render();});
  upd();
  updateCount("price",0);
}

function setupDates(){
  $("#date-from").addEventListener("change",e=>{state.from=e.target.value;syncDateCount();render();});
  $("#date-to").addEventListener("change",e=>{state.to=e.target.value;syncDateCount();render();});
  document.querySelectorAll("[data-preset]").forEach(b=>b.addEventListener("click",()=>{
    const months=+b.dataset.preset; const f=today(); const t=new Date(f); t.setMonth(t.getMonth()+months);
    const iso=d=>d.toISOString().slice(0,10);
    state.from=iso(f); state.to=iso(t); $("#date-from").value=state.from; $("#date-to").value=state.to;
    document.querySelectorAll("[data-preset]").forEach(x=>x.classList.remove("selected")); b.classList.add("selected");
    syncDateCount(); render();
  }));
  $("#clear-dates").addEventListener("click",()=>{
    state.from="";state.to="";$("#date-from").value="";$("#date-to").value="";
    document.querySelectorAll("[data-preset]").forEach(x=>x.classList.remove("selected"));
    syncDateCount(); render();
  });
}
function syncDateCount(){ updateCount("date",(state.from||state.to)?1:0); }

function passesFilters(c){
  const td=today();
  if(state.upcoming){ const de=parseISO(c.end)||parseISO(c.start); if(de && de<td) return false; }
  if(state.from){ const de=parseISO(c.end)||parseISO(c.start); if(de && de<parseISO(state.from)) return false; }
  if(state.to){ const ds=parseISO(c.start); if(ds && ds>parseISO(state.to)) return false; }
  if(state.country.size && !state.country.has(c.country)) return false;
  if(state.city.size && !state.city.has(c.city)) return false;
  if(state.format.size){
    const f=c.format;
    const ok=(state.format.has("Virtual")&&(f==="Virtual"||f==="Hybrid"))
           ||(state.format.has("In-Person")&&(f==="In-Person"||f==="Hybrid"))
           ||(state.format.has("Hybrid")&&f==="Hybrid");
    if(!ok) return false;
  }
  if(state.topic.size && !c.topics.some(t=>state.topic.has(t))) return false;
  if(state.attendee.size && !c.attendees.some(a=>state.attendee.has(a))) return false;
  // price
  const priced = typeof c.priceMin==="number" && typeof c.priceMax==="number";
  if(priced){
    if(c.priceMax<state.priceMin || c.priceMin>state.priceMax) return false;
  } else {
    if(!state.includeUnpriced) return false;
  }
  if(state.q){
    const hay=[c.name,c.org,c.city,c.country,c.overview,c.topics.join(" "),c.attendees.join(" ")].join(" ").toLowerCase();
    if(!hay.includes(state.q)) return false;
  }
  return true;
}

  const color=BAR_COLORS[(i||0)%3];
  const host=hostFromLink(c.link);
  // Location: US shows "City, State" with the country underneath; non-US shows "City, Country"
  let locTop="", locSub="";
  if(c.format==="Virtual"){ locTop="Online"; }
  else if((c.country||"").trim()==="United States"){
    locTop=[c.city,c.state].filter(x=>x && x!=="TBA").join(", ") || (c.city==="TBA"?"Location TBA":"");
    locSub="United States";
  } else {
    locTop=[c.city,c.country].filter(x=>x && x!=="TBA").join(", ") || (c.city==="TBA"?"Location TBA":"");
  }
  const aud = c.attendees.join(" \u00b7 ");
  const cal=`<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`;
  const pin=`<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  return `<div class="card" style="--bar:${color}">
    <div class="card-bar"></div>
    <div class="card-body">
      <div class="card-meta-top">
        <span class="card-topics">${c.topics.join(" \u00b7 ")}</span>
        <span class="card-format ${fmtClass(c.format)}">${c.format||""}</span>
      </div>
      <div class="card-title">${c.name}</div>
      ${host?`<div class="card-org">${host}</div>`:""}
      <div class="card-meta">
        <span>${cal}${fmtRange(c.start,c.end)}</span>
        ${locTop?`<span>${pin}${locTop}</span>`:""}
        ${locSub?`<span style="padding-left:18px">${locSub}</span>`:""}
      </div>
      ${c.overview?`<div class="card-summary">${firstSentence(c.overview)}</div>`:""}
      <div class="card-price">${fmtPrice(c)}${c.priceNotes?`<span class="note">${c.priceNotes}</span>`:""}</div>
      ${aud?`<div class="card-audience"><b>Who it's for</b>${aud}</div>`:""}
      ${c.link?`<a class="card-link" href="${c.link}" target="_blank" rel="noopener">Visit site &rarr;</a>`:""}
    </div>
  </div>`;
}

function render(){
  const list=CONF_DATA.filter(passesFilters).sort((a,b)=>(parseISO(a.start)||0)-(parseISO(b.start)||0));
  const grid=$("#grid"), bar=$("#results-bar"), st=$("#state");
  if(!list.length){ grid.innerHTML=""; bar.style.display="none"; st.style.display="block"; st.innerHTML="<p>No conferences match your filters.</p>"; requestAnimationFrame(postHeight); return; }
  st.style.display="none"; bar.style.display="flex";
  $("#count-label").innerHTML=`<strong>${list.length}</strong> conference${list.length!==1?"s":""}`;
  grid.innerHTML=list.map((c,i)=>card(c,i)).join("");
  requestAnimationFrame(postHeight);
}


// ---- Load data from the published Google Sheet CSV ----
function splitLine(line){const r=[];let c="",q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c="";}else c+=ch;}r.push(c);return r;}
function parseCSV(text){const lines=text.trim().split(/\r?\n/);const headers=splitLine(lines[0]).map(h=>h.trim());return lines.slice(1).map(line=>{const v=splitLine(line);const o={};headers.forEach((h,i)=>o[h]=(v[i]||"").trim());return o;});}
function numOrNull(v){const n=parseFloat(String(v).replace(/[^0-9.\-]/g,""));return isNaN(n)?null:n;}
function mapRow(r){return {
  name:r["Name"]||"", org:r["Organizers"]||"",
  start:r["Date Start (ISO)"]||"", end:r["Date End (ISO)"]||"",
  city:r["City"]||"", state:r["State/Province"]||"", country:r["Country"]||"",
  format:r["Format"]||"", priceStatus:r["Price Status"]||"",
  priceMin:numOrNull(r["Price Min (USD)"]), priceMax:numOrNull(r["Price Max (USD)"]),
  priceNotes:r["Price Notes"]||"",
  topics:(r["Topics"]||"").split(";").map(s=>s.trim()).filter(Boolean),
  attendees:(r["Attendee Types"]||"").split(";").map(s=>s.trim()).filter(Boolean),
  link:(r["Conference Link"]||"").replace(/\s/g,""), overview:r["Overview"]||"",
  active:(r["Active"]||"").trim().toLowerCase()
};}
async function loadConferences(){
  const st=$("#state"); st.style.display="block"; st.innerHTML="<p>Loading conferences...</p>";
  if(CSV_URL==="PASTE_YOUR_PUBLISHED_CSV_URL_HERE"){ CONF_DATA=CONF_FALLBACK; init(); render(); return; }
  try{
    const res=await fetch(CSV_URL+(CSV_URL.includes("?")?"&":"?")+"t="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    CONF_DATA=parseCSV(await res.text()).map(mapRow).filter(c=>c.active==="yes"&&c.name);
    if(!CONF_DATA.length) throw new Error("0 usable rows (is the Sheet shared publicly?)");
    init(); render();
  }catch(e){
    console.warn("Live data load failed, using built-in copy:", e);
    CONF_DATA=CONF_FALLBACK; init(); render();
  }
}

function init(){
setupTriggers();
buildChips("country-options",uniqueSorted("country"),state.country,"country");
buildChips("city-options",uniqueSorted("city"),state.city,"city");
buildChips("format-options",["In-Person","Virtual","Hybrid"],state.format,"format");
buildChips("topic-options",uniqueSorted("topics"),state.topic,"topic");
buildChips("attendee-options",uniqueSorted("attendees"),state.attendee,"attendee");
initPrice();
setupDates();
$("#search").addEventListener("input",e=>{state.q=e.target.value.toLowerCase();render();});
$("#upcoming-toggle").addEventListener("change",e=>{state.upcoming=e.target.checked;render();});
$("#clear-all").addEventListener("click",()=>{
  state.q="";["country","city","format","topic","attendee"].forEach(k=>state[k].clear());
  state.from="";state.to="";state.includeUnpriced=true;
  $("#search").value="";$("#date-from").value="";$("#date-to").value="";$("#include-unpriced").checked=true;
  $("#price-min").value=0;$("#price-max").value=PRICE_CAP;state.priceMin=0;state.priceMax=PRICE_CAP;
  $("#price-range-fill").style.left="0%";$("#price-range-fill").style.right="0%";
  $("#price-readout").textContent=money(0)+" \u2013 "+money(PRICE_CAP)+"+";
  document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
  document.querySelectorAll(".filter-trigger").forEach(t=>{t.classList.remove("active","has-selections","open");t.querySelector(".filter-count").style.display="none";});
  document.querySelectorAll(".filter-panel").forEach(p=>p.classList.remove("open"));
  render();
});
  render();
}

loadConferences();

// Showit iframe height passing (robust: handles mobile stacking and late font reflow)
function postHeight(){
  if(window.parent && window.parent!==window){
    var hgt=Math.max(document.body.scrollHeight, document.body.offsetHeight,
                     document.documentElement.scrollHeight, document.documentElement.offsetHeight);
    window.parent.postMessage({type:"juniper-conferences-height", height:hgt}, "*");
  }
}
window.addEventListener("load",postHeight);
window.addEventListener("resize",postHeight);
document.addEventListener("DOMContentLoaded",postHeight);
if(document.fonts && document.fonts.ready) document.fonts.ready.then(postHeight);
if(typeof ResizeObserver!=="undefined") new ResizeObserver(postHeight).observe(document.body); else setInterval(postHeight,500);
[150,400,800,1500,3000].forEach(function(t){ setTimeout(postHeight,t); });
</script>
